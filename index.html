<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aleksandra · Agent OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #090909; --surface: #0f0f0f; --border: #1c1c1c; --border2: #242424;
      --text: #c8c8c8; --muted: #555; --faint: #2a2a2a;
      --amber: #f59e0b; --amber-dim: rgba(245,158,11,0.12);
      --green: #4ade80; --red: #f87171; --yellow: #facc15;
      --mono: 'DM Mono', monospace; --sans: 'Syne', sans-serif;
    }
    html, body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 36px 32px 48px; }
    .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 36px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .logo { font-family: var(--sans); font-size: 22px; font-weight: 700; letter-spacing: 0.12em; color: var(--amber); text-transform: uppercase; }
    .logo-sub { font-family: var(--mono); font-size: 10px; color: var(--faint); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 4px; }
    .sync-info { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 5px; }
    .refresh-btn { background: transparent; border: 1px solid var(--border2); border-radius: 5px; color: var(--muted); font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; padding: 9px 18px; cursor: pointer; text-transform: uppercase; transition: border-color 0.2s, color 0.2s; }
    .refresh-btn:hover { border-color: var(--amber); color: var(--amber); }
    .refresh-btn:disabled { opacity: 0.3; cursor: default; }
    .section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .section-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; color: var(--amber); text-transform: uppercase; white-space: nowrap; }
    .section-count { font-family: var(--mono); font-size: 9px; color: var(--faint); }
    .section-rule { flex: 1; height: 1px; background: linear-gradient(to right, var(--border2), transparent); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px 22px; }
    .agent-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .agent-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: var(--green); box-shadow: 0 0 7px var(--green); }
    .dot-red { background: var(--red); box-shadow: 0 0 7px var(--red); }
    .dot-yellow { background: var(--yellow); box-shadow: 0 0 7px var(--yellow); }
    .dot-grey { background: var(--faint); }
    .agent-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .agent-name { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; color: #999; text-transform: uppercase; }
    .agent-meta { font-family: var(--mono); font-size: 10px; color: var(--faint); line-height: 2; }
    .agent-meta span { color: #777; }
    .agent-error { font-family: var(--mono); font-size: 9px; color: var(--red); margin-top: 6px; word-break: break-word; line-height: 1.5; }
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 700px) { .main-grid, .bottom-grid { grid-template-columns: 1fr; } }
    .item-list { display: flex; flex-direction: column; gap: 12px; }
    .briefing-item { border-left: 2px solid var(--amber-dim); padding-left: 12px; }
    .item-title { font-size: 13px; color: #bbb; line-height: 1.45; margin-bottom: 4px; }
    .item-meta { font-family: var(--mono); font-size: 9px; color: var(--faint); display: flex; gap: 10px; }
    .priority-high { color: var(--red); }
    .priority-medium { color: var(--yellow); }
    .priority-low { color: var(--green); }
    .empty { font-family: var(--mono); font-size: 11px; color: var(--faint); }
    .decision-row { display: flex; align-items: flex-start; gap: 10px; }
    .decision-icon { font-family: var(--mono); font-size: 11px; padding-top: 1px; flex-shrink: 0; }
    .icon-approved { color: var(--green); }
    .icon-rejected { color: var(--red); }
    .icon-edited { color: var(--yellow); }
    .decision-title { font-size: 13px; color: #888; line-height: 1.4; }
    .decision-meta { font-family: var(--mono); font-size: 9px; color: var(--faint); }
    .pref-item { margin-bottom: 14px; }
    .pref-tags { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .pref-tag { font-family: var(--mono); font-size: 8px; color: var(--amber); border: 1px solid rgba(245,158,11,0.25); padding: 2px 7px; border-radius: 3px; letter-spacing: 0.1em; text-transform: uppercase; }
    .pref-conf { font-family: var(--mono); font-size: 9px; color: var(--faint); }
    .pref-rule { font-size: 13px; color: #999; line-height: 1.5; }
    .memory-scroll { max-height: 340px; overflow-y: auto; padding-right: 4px; }
    .memory-scroll::-webkit-scrollbar { width: 3px; }
    .memory-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .memory-item { padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
    .memory-item:last-child { border-bottom: none; margin-bottom: 0; }
    .memory-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .memory-entity { font-family: var(--mono); font-size: 9px; color: var(--amber); letter-spacing: 0.1em; text-transform: uppercase; }
    .memory-category { font-family: var(--mono); font-size: 9px; color: var(--border2); }
    .memory-context { font-size: 12px; color: #666; line-height: 1.55; }
    .error-banner { background: #150a0a; border: 1px solid #3a1515; border-radius: 6px; padding: 12px 16px; margin-bottom: 20px; font-family: var(--mono); font-size: 11px; color: var(--red); }
    .footer { display: flex; justify-content: space-between; margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 9px; color: var(--border2); letter-spacing: 0.08em; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    .pulsing { animation: pulse 1.4s ease-in-out infinite; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="logo">Aleksandra</div>
      <div class="logo-sub">Personal Agent OS</div>
      <div class="sync-info" id="sync-info">connecting...</div>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">Refresh</button>
  </div>

  <div id="error-banner" class="error-banner" style="display:none"></div>

  <div class="section-head">
    <span class="section-label">Agent Status</span>
    <span class="section-count" id="agent-count"></span>
    <div class="section-rule"></div>
  </div>
  <div class="agent-grid" id="agent-grid"><div class="agent-card"><div class="empty pulsing">loading...</div></div></div>

  <div class="main-grid">
    <div class="card">
      <div class="section-head">
        <span class="section-label">Pending</span>
        <span class="section-count" id="pending-count"></span>
        <div class="section-rule"></div>
      </div>
      <div id="pending-list" class="item-list"><div class="empty pulsing">loading...</div></div>
    </div>
    <div class="card">
      <div class="section-head">
        <span class="section-label">Recent Decisions</span>
        <span class="section-count" id="decided-count"></span>
        <div class="section-rule"></div>
      </div>
      <div id="decided-list" class="item-list"><div class="empty pulsing">loading...</div></div>
    </div>
  </div>

  <div class="bottom-grid">
    <div class="card">
      <div class="section-head">
        <span class="section-label">Learned Preferences</span>
        <span class="section-count" id="prefs-count"></span>
        <div class="section-rule"></div>
      </div>
      <div id="prefs-list"><div class="empty pulsing">loading...</div></div>
    </div>
    <div class="card">
      <div class="section-head">
        <span class="section-label">Memory</span>
        <span class="section-count" id="memory-count"></span>
        <div class="section-rule"></div>
      </div>
      <div class="memory-scroll"><div id="memory-list"><div class="empty pulsing">loading...</div></div></div>
    </div>
  </div>

  <div class="footer">
    <span>aleksandra - agent os</span>
    <span id="footer-ts"></span>
  </div>
</div>

<script>
  const SB_URL = 'https://ztgdtthdmosjvqpauzqw.supabase.co/rest/v1';
  const SB_KEY = 'sb_publishable_ZoTVAdhfEe5K6eKoNZV5DQ_jw3yI0MD';
  const H = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };

  const AGENT_NAMES = {
    'igor': 'Igor',
    'masha': 'Masha',
    'vera': 'Vera',
    'aleksei': 'Aleksei',
    'pavel': 'Pavel',
    'boris-keeper': 'Boris - Keeper',
    'boris-tropiq': 'Boris - TropiQ',
    'boris-sorte-do-jugo': 'Boris - Sorte do Jugo',
    'dmitri-personal': 'Dmitri - Personal',
    'dmitri-qestra': 'Dmitri - Qestra',
    'nadia': 'Nadia',
    'katya': 'Katya',
  };

  function displayName(agent) {
    return AGENT_NAMES[agent] || (agent || 'unknown').replace('aleksandra-','').replace('-agent','').toUpperCase();
  }

  async function q(table, params) {
    const url = params ? `${SB_URL}/${table}?${params}` : `${SB_URL}/${table}`;
    const r = await fetch(url, { headers: H });
    if (!r.ok) throw new Error(`${table}: ${r.status} ${r.statusText}`);
    return r.json();
  }

  function timeAgo(ts) {
    if (!ts) return '-';
    const s = Math.floor((Date.now() - new Date(ts)) / 1000);
    if (s < 60) return `${s}s ago`;
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    return `${Math.floor(s/86400)}d ago`;
  }

  function dotClass(status) {
    if (status === 'success') return 'dot dot-green';
    if (status === 'error') return 'dot dot-red';
    if (status === 'running') return 'dot dot-yellow';
    return 'dot dot-grey';
  }

  function setCount(id, n) {
    const el = document.getElementById(id);
    if (el) el.textContent = `(${n})`;
  }

  function renderAgents(runs) {
    const byAgent = {};
    runs.forEach(r => { if (!byAgent[r.agent]) byAgent[r.agent] = r; });
    const agents = Object.values(byAgent);
    setCount('agent-count', agents.length);
    const grid = document.getElementById('agent-grid');
    if (!agents.length) {
      grid.innerHTML = '<div class="agent-card"><div class="empty">No agent runs yet</div></div>';
      return;
    }
    grid.innerHTML = agents.map(r => `
      <div class="agent-card">
        <div class="agent-name-row">
          <div class="${dotClass(r.status)}"></div>
          <span class="agent-name">${displayName(r.agent)}</span>
        </div>
        <div class="agent-meta">
          ran <span>${timeAgo(r.started_at)}</span><br>
          ${r.duration_ms ? `took <span>${(r.duration_ms/1000).toFixed(1)}s</span>` : ''}
          ${r.items_created ? ` &middot; <span>${r.items_created} items</span>` : ''}
        </div>
        ${r.error ? `<div class="agent-error">${r.error.slice(0,120)}</div>` : ''}
      </div>`).join('');
  }

  function renderBriefing(items, decisions) {
    const pending = items.filter(i => i.status === 'pending');
    setCount('pending-count', pending.length);
    setCount('decided-count', decisions.length);

    const pendingEl = document.getElementById('pending-list');
    pendingEl.innerHTML = pending.length
      ? pending.map(i => `
          <div class="briefing-item">
            <div class="item-title">${i.title || 'Untitled'}</div>
            <div class="item-meta">
              <span>${displayName(i.agent)}</span>
              <span class="priority-${i.priority || 'medium'}">${i.priority || 'medium'}</span>
              <span>${timeAgo(i.created_at)}</span>
            </div>
          </div>`).join('')
      : '<div class="empty">inbox clear</div>';

    const decidedEl = document.getElementById('decided-list');
    decidedEl.innerHTML = decisions.length
      ? decisions.slice(0, 8).map(d => {
          const a = d.action || 'actioned';
          const icon = a === 'approved' ? '+' : a === 'rejected' ? 'x' : '~';
          const cls = a === 'approved' ? 'icon-approved' : a === 'rejected' ? 'icon-rejected' : 'icon-edited';
          return `
            <div class="decision-row">
              <div class="decision-icon ${cls}">${icon}</div>
              <div>
                <div class="decision-title">${displayName(d.agent)}</div>
                <div class="decision-meta">${timeAgo(d.created_at)}</div>
              </div>
            </div>`;
        }).join('')
      : '<div class="empty">no decisions yet</div>';
  }

  function renderPreferences(prefs) {
    setCount('prefs-count', prefs.length);
    const el = document.getElementById('prefs-list');
    el.innerHTML = prefs.length
      ? prefs.map(p => `
          <div class="pref-item">
            <div class="pref-tags">
              <span class="pref-tag">${displayName(p.agent)}</span>
              ${p.confidence ? `<span class="pref-conf">${Math.round(p.confidence*100)}% conf &middot; ${p.sample_size||0} samples</span>` : ''}
            </div>
            <div class="pref-rule">${p.rule}</div>
          </div>`).join('')
      : '<div class="empty">no preferences inferred yet</div>';
  }

  function renderMemory(mem) {
    setCount('memory-count', mem.length);
    const el = document.getElementById('memory-list');
    el.innerHTML = mem.length
      ? mem.map(m => `
          <div class="memory-item">
            <div class="memory-head">
              <span class="memory-entity">${m.entity || '-'}</span>
              ${m.category ? `<span class="memory-category">${m.category}</span>` : ''}
            </div>
            <div class="memory-context">${m.context || ''}</div>
          </div>`).join('')
      : '<div class="empty">no memory entries</div>';
  }

  async function loadAll() {
    const btn = document.getElementById('refresh-btn');
    const info = document.getElementById('sync-info');
    const errEl = document.getElementById('error-banner');
    btn.disabled = true;
    btn.textContent = 'Syncing...';
    btn.classList.add('pulsing');
    info.textContent = 'syncing...';
    errEl.style.display = 'none';

    try {
      const [runs, items, decisions, memory, prefs] = await Promise.all([
        q('agent_runs', 'order=started_at.desc&limit=30'),
        q('briefing_items', 'order=created_at.desc&limit=20'),
        q('decisions', 'order=created_at.desc&limit=20'),
        q('memory', 'order=entity.asc'),
        q('preferences', 'order=confidence.desc'),
      ]);

      renderAgents(runs);
      renderBriefing(items, decisions);
      renderPreferences(prefs);
      renderMemory(memory);

      const now = new Date();
      info.textContent = `last sync ${now.toLocaleTimeString('en-IE', { hour: '2-digit', minute: '2-digit' })}`;
      document.getElementById('footer-ts').textContent = now.toISOString().slice(0, 16).replace('T', ' ') + ' UTC';
    } catch(e) {
      errEl.style.display = 'block';
      errEl.textContent = 'Error: ' + e.message;
      info.textContent = 'sync failed';
      console.error('Dashboard load failed:', e);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Refresh';
      btn.classList.remove('pulsing');
    }
  }

  loadAll();
  setInterval(loadAll, 2 * 60 * 1000);
</script>
</body>
</html>
